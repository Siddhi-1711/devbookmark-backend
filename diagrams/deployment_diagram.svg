<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1180" viewBox="0 0 1900 1180">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill:#0f172a; }
      .sub { font: 500 15px Arial, sans-serif; fill:#475569; }
      .label { font: 700 18px Arial, sans-serif; fill:#0f172a; }
      .body { font: 500 14px Arial, sans-serif; fill:#334155; }
      .small { font: 500 13px Arial, sans-serif; fill:#475569; }
      .comm { stroke:#475569; stroke-width:3.2; fill:none; marker-end:url(#arrow); }
      .dep { stroke:#94a3b8; stroke-width:2.2; fill:none; stroke-dasharray:8 8; marker-end:url(#openarrow); }
      .artifactText { font: 700 16px Arial, sans-serif; fill:#0f172a; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 z" fill="#475569"/>
    </marker>
    <marker id="openarrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1,7 L11,1 M1,7 L11,13" stroke="#94a3b8" stroke-width="2" fill="none"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1900" height="1180" fill="#f8fafc"/>

  <!-- USER BROWSER -->
  <g filter="url(#shadow)">
    <rect x="90" y="190" width="250" height="130" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <polygon points="340,190 372,166 372,296 340,320" fill="#e2e8f0" stroke="#334155" stroke-width="2"/>
    <polygon points="90,190 122,166 372,166 340,190" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
    <text x="120" y="228" class="label">«device»</text>
    <text x="120" y="256" class="label">User Browser</text>
    <text x="120" y="282" class="small">Chrome / Edge / Firefox</text>
  </g>

  <!-- NETLIFY -->
  <g filter="url(#shadow)">
    <rect x="470" y="150" width="410" height="250" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
    <polygon points="880,150 914,124 914,374 880,400" fill="#bae6fd" stroke="#0891b2" stroke-width="2"/>
    <polygon points="470,150 504,124 914,124 880,150" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
    <text x="500" y="188" class="label">«executionEnvironment»</text>
    <text x="500" y="216" class="label">Netlify</text>
    <text x="500" y="244" class="body">Hosts the React + Vite frontend</text>
    <text x="500" y="268" class="body">Serves SPA routes, HTML, JS, CSS, assets</text>
    <text x="500" y="292" class="small">Public-facing static hosting / CDN runtime</text>

    <rect x="545" y="312" width="265" height="62" rx="10" fill="#ffffff" stroke="#0891b2" stroke-width="2"/>
    <text x="565" y="350" class="artifactText">«artifact» frontend build</text>
  </g>

  <!-- RENDER -->
  <g filter="url(#shadow)">
    <rect x="1010" y="150" width="455" height="290" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <polygon points="1465,150 1499,124 1499,414 1465,440" fill="#ddd6fe" stroke="#7c3aed" stroke-width="2"/>
    <polygon points="1010,150 1044,124 1499,124 1465,150" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="1040" y="188" class="label">«executionEnvironment»</text>
    <text x="1040" y="216" class="label">Render</text>
    <text x="1040" y="244" class="body">Runs Spring Boot backend inside Docker</text>
    <text x="1040" y="268" class="body">Spring Security, controllers, services, JPA, Actuator</text>
    <text x="1040" y="292" class="small">Primary backend runtime</text>

    <rect x="1080" y="320" width="325" height="66" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
    <text x="1100" y="360" class="artifactText">«artifact» backend JAR / Docker image</text>
  </g>

  <!-- GITHUB -->
  <g filter="url(#shadow)">
    <rect x="280" y="610" width="460" height="190" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <polygon points="740,610 772,586 772,776 740,800" fill="#e2e8f0" stroke="#334155" stroke-width="2"/>
    <polygon points="280,610 312,586 772,586 740,610" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
    <text x="310" y="652" class="label">«node» GitHub Repositories</text>
    <text x="310" y="680" class="body">devbookmark-frontend</text>
    <text x="310" y="708" class="body">devbookmark-backend</text>
    <text x="310" y="736" class="small">Deployment source for frontend and backend</text>
  </g>

  <!-- NEON -->
  <g filter="url(#shadow)">
    <rect x="980" y="610" width="355" height="190" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
    <polygon points="1335,610 1367,586 1367,776 1335,800" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
    <polygon points="980,610 1012,586 1367,586 1335,610" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="1010" y="652" class="label">«executionEnvironment»</text>
    <text x="1010" y="680" class="label">Neon</text>
    <text x="1010" y="708" class="body">Managed PostgreSQL runtime / storage layer</text>

    <rect x="1045" y="728" width="245" height="52" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
    <text x="1065" y="760" class="artifactText">«artifact» PostgreSQL database</text>
  </g>

  <!-- CLOUDINARY -->
  <g filter="url(#shadow)">
    <rect x="1425" y="610" width="355" height="190" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <polygon points="1780,610 1812,586 1812,776 1780,800" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
    <polygon points="1425,610 1457,586 1812,586 1780,610" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
    <text x="1455" y="652" class="label">«external service»</text>
    <text x="1455" y="680" class="label">Cloudinary</text>
    <text x="1455" y="708" class="body">Image and document storage</text>
    <text x="1455" y="736" class="small">Uploaded files, covers, media asset delivery</text>
  </g>

  <!-- UPTIMEROBOT -->
  <g filter="url(#shadow)">
    <rect x="1510" y="900" width="270" height="150" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
    <polygon points="1780,900 1808,878 1808,1028 1780,1050" fill="#fecdd3" stroke="#e11d48" stroke-width="2"/>
    <polygon points="1510,900 1538,878 1808,878 1780,900" fill="#ffe4e6" stroke="#e11d48" stroke-width="2"/>
    <text x="1540" y="940" class="label">«external service»</text>
    <text x="1540" y="968" class="label">UptimeRobot</text>
    <text x="1540" y="996" class="body">Pings backend health endpoint</text>
    <text x="1540" y="1022" class="small">GET /actuator/health every 5 min</text>
  </g>

  <!-- DEPLOYMENT SPEC -->
  <g filter="url(#shadow)">
    <rect x="760" y="920" width="470" height="130" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="785" y="962" class="label">«deploymentSpec» runtime configuration</text>
    <text x="785" y="992" class="body">Environment variables, JWT secret, DB URL, Cloudinary credentials, frontend URL</text>
    <text x="785" y="1018" class="small">Applied to backend runtime on Render</text>
  </g>

  <!-- COMMUNICATION PATHS -->
  <path d="M372 255 L470 255" class="comm"/>
  <text x="394" y="238" class="small">HTTPS</text>

  <path d="M914 255 L1010 255" class="comm"/>
  <text x="930" y="238" class="small">REST API over HTTPS</text>

  <path d="M1230 440 L1170 610" class="comm"/>
  <text x="1122" y="515" class="small">JPA / SQL</text>

  <path d="M1355 440 L1570 610" class="comm"/>
  <text x="1462" y="515" class="small">Media upload / fetch</text>

  <path d="M1580 900 L1325 440" class="comm"/>
  <text x="1455" y="705" class="small">GET /actuator/health</text>

  <!-- DEPENDENCIES -->
    <path d="M620 400 L740 635" class="dep"/>
  <text x="852" y="520" class="small">backend deployment dependency</text>

    <path d="M1100 390 L772 670" class="dep"/>
  <text x="505" y="520" class="small">frontend deployment dependency</text>

    <path d="M1285 440 L1230 985" class="dep"/>
  <text x="1298" y="750" class="small">deployment specification</text>
</svg>
