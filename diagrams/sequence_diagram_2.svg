  <text class="msg" id="svg_56" text-anchor="middle" x="162.5" y="292">1. Open Home / Feed page</text>
  <line class="arrow" id="svg_57" x1="230" x2="410" y1="340" y2="340"/>
  <text class="msg" font-size="14" id="svg_58" text-anchor="middle" x="401" y="325">2. GET /api/feed?page=0&amp;size=10 + Bearer token</text>
  <line class="return" id="svg_59" x1="410" x2="220" y1="382" y2="382"/>
  <text class="ret" font-size="12.07" id="svg_60" text-anchor="middle" x="321.51" y="374">token valid, set SecurityContext</text>
  <line class="arrow" id="svg_61" x1="231" x2="610" y1="420" y2="420"/>
  <text class="msg" font-size="14" id="svg_62" text-anchor="middle" x="547" y="408">3. Forward request to FeedController</text>
  <line class="arrow" id="svg_63" transform="matrix(1 0 0 1 0 0)" x1="619" x2="810" y1="460" y2="460"/>
  <text class="msg" font-size="14" id="svg_64" text-anchor="middle" x="760" y="449">4. myFeed(pageable, principal.userId)</text>
  <line class="arrow" id="svg_65" x1="818" x2="1010" y1="512" y2="512"/>
  <text class="msg" font-size="14" id="svg_66" text-anchor="middle" transform="matrix(1 0 0 1 0 0)" x="916" y="506">5. myFollowingIds(userId)</text>
  <line class="return" id="svg_67" x1="1010" x2="810" y1="548" y2="548"/>
  <text class="ret" id="svg_68" text-anchor="middle" transform="matrix(1 0 0 1 0 0)" x="910" y="540">followingIds</text>
  <line class="arrow" id="svg_69" x1="820" x2="1220" y1="600" y2="600"/>
  <text class="msg" font-size="14" id="svg_70" text-anchor="middle" x="969" y="595">6. findFollowedTagNamesByUserId(userId)</text>
  <line class="return" id="svg_71" x1="1220" x2="810" y1="636" y2="636"/>
  <text class="ret" id="svg_72" text-anchor="middle" x="1015" y="628">followedTags</text>
  <line class="arrow" id="svg_73" transform="matrix(1 0 0 1 0 0)" x1="820" x2="1450" y1="688" y2="688"/>
  <text class="msg" id="svg_74" text-anchor="middle" x="1130" y="680">7. findFeedWithTags(userId, followingIds, followedTags, pageable)</text>
  <line class="return" id="svg_75" x1="1450" x2="810" y1="724" y2="724"/>
  <text class="ret" id="svg_76" text-anchor="middle" x="1130" y="716">Page&lt;Resource&gt;</text>
  <line class="arrow" id="svg_77" x1="810" x2="1610" y1="792" y2="792"/>
  <text class="msg" id="svg_78" style="cursor: move;" text-anchor="middle" x="1210" y="784">8. enrichPage(resources, userId)</text>
  <line class="return" id="svg_79" x1="1610" x2="810" y1="840" y2="840"/>
  <text class="ret" id="svg_80" text-anchor="middle" x="1210" y="832">Page&lt;ResourceResponse&gt; (batched counts + flags)</text>
  <line class="return" id="svg_81" x1="810" x2="610" y1="900" y2="900"/>
  <line class="return" id="svg_83" x1="610" x2="220" y1="940" y2="940"/>
  <text class="ret" id="svg_84" style="cursor: move;" text-anchor="middle" x="415" y="932"/>
  <line class="return" id="svg_85" x1="220" x2="105" y1="980" y2="980"/>
  <text class="msg" font-size="14" id="svg_98" style="cursor: move;" text-anchor="middle" x="715.48" y="889.37">9. return page response</text>
  <text class="msg" font-size="14" id="svg_99" text-anchor="middle" transform="matrix(1 0 0 1 0 0)" x="417.36" y="930.37">10. 200 OK { content, page, totalPages, totalElements }</text>
  <text class="msg" font-size="14" id="svg_100" text-anchor="middle" transform="matrix(1 0 0 1 0 0)" x="175.96" y="974.06">11. Render feed cards</text>
