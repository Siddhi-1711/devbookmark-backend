<?xml version="1.0"?>
<svg width="1700" height="1080" xmlns="http://www.w3.org/2000/svg" xmlns:svg="http://www.w3.org/2000/svg">
 <defs>
  <style>.title { font: 700 28px Arial, sans-serif; fill:#0f172a; }
      .sub { font: 500 14px Arial, sans-serif; fill:#475569; }
      .boxLabel1 { font: 700 17px Arial, sans-serif; fill:#0f172a; }
      .boxLabel2 { font: 500 14px Arial, sans-serif; fill:#334155; }
      .msg { font: 600 14px Arial, sans-serif; fill:#0f172a; }
      .ret { font: 500 13px Arial, sans-serif; fill:#475569; }
      .noteTitle { font: 700 16px Arial, sans-serif; fill:#854d0e; }
      .noteText { font: 500 13px Arial, sans-serif; fill:#78350f; }
      .lifeline { stroke:#cbd5e1; stroke-width:2; stroke-dasharray:10 8; }
      .arrow { stroke:#334155; stroke-width:2.6; fill:none; marker-end:url(#arrowhead); }
      .return { stroke:#94a3b8; stroke-width:2.1; fill:none; stroke-dasharray:10 8; marker-end:url(#openarrow); }
      .activation-blue { fill:#dbeafe; stroke:#60a5fa; stroke-width:1.2; rx:7; }
      .activation-green { fill:#dcfce7; stroke:#4ade80; stroke-width:1.2; rx:7; }
      .activation-amber { fill:#fef3c7; stroke:#f59e0b; stroke-width:1.2; rx:7; }
      .group { fill:#ffffff; stroke:#e2e8f0; stroke-width:1.5; rx:14; }
      .note { fill:#fffbeb; stroke:#f59e0b; stroke-width:1.4; rx:14; }
      .divider { stroke:#e2e8f0; stroke-width:1.4; }</style>
 </defs>
