<?xml version="1.0"?>
<svg width="1800" height="1000" xmlns="http://www.w3.org/2000/svg" xmlns:svg="http://www.w3.org/2000/svg">
 <defs>
  <filter height="140%" id="shadow" width="140%" x="-20%" y="-20%"/>
  <style>.title { font: 700 28px Arial, sans-serif; fill:#0f172a; }
    .sub { font: 500 14px Arial, sans-serif; fill:#475569; }
    .head { font: 700 16px Arial, sans-serif; fill:#0f172a; }
    .text { font: 500 13px Arial, sans-serif; fill:#334155; }
    .small { font: 500 12px Arial, sans-serif; fill:#475569; }
    .box { fill:#ffffff; stroke:#94a3b8; stroke-width:1.6; rx:14; }
    .actor { fill:#ffffff; stroke:#0f172a; stroke-width:2; }
    .lifeline { stroke:#cbd5e1; stroke-width:2; stroke-dasharray:8 7; }
    .call { stroke:#334155; stroke-width:2.4; fill:none; marker-end:url(#arrow); }
    .ret { stroke:#64748b; stroke-width:2; fill:none; stroke-dasharray:8 6; marker-end:url(#arrowLight); }
    .activation { fill:#dbeafe; stroke:#60a5fa; stroke-width:1; rx:6; }
    .note { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1.2; rx:10; }
    .alt { fill:#fff7ed; stroke:#fdba74; stroke-width:1.4; rx:12; }</style>
 </defs>
 <g class="layer">
  <title>Layer 1</title>
  <rect fill="#f8fafc" height="1000" id="svg_3" width="1800" x="29" y="-25"/>
