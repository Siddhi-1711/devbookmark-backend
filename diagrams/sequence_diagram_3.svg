  <rect class="activation" height="51" id="svg_38" transform="matrix(1 0 0 1 0 0)" width="16" x="1365" y="626"/>
  <line class="call" id="svg_39" transform="matrix(1 0 0 1 0 0)" x1="188" x2="415" y1="250" y2="250"/>
  <text class="text" id="svg_40" text-anchor="middle" transform="matrix(1 0 0 1 0 0)" x="306.5" y="244">Click Like</text>
  <line class="call" id="svg_41" transform="matrix(1 0 0 1 0 0)" x1="425" x2="651" y1="305" y2="305"/>
  <text class="text" font-size="13" id="svg_42" text-anchor="middle" transform="matrix(1 0 0 1 0 0)" x="575.5" y="296">POST /api/resources/{id}/like + Bearer token</text>
  <line class="call" id="svg_43" x1="662" x2="899" y1="360" y2="360"/>
  <text class="text" id="svg_44" text-anchor="middle" x="780.5" y="354">authenticated request</text>
  <line class="call" id="svg_45" x1="899" x2="1136" y1="415" y2="415"/>
  <text class="text" id="svg_46" text-anchor="middle" x="1017.5" y="409">like(resourceId, userId)</text>
  <line class="call" id="svg_47" x1="1136" x2="1610" y1="470" y2="470"/>
  <text class="text" id="svg_48" text-anchor="middle" x="1373" y="464">check resource exists + existing like</text>
  <line class="ret" id="svg_49" x1="1610" x2="1136" y1="505" y2="505"/>
  <text class="text" id="svg_50" text-anchor="middle" x="1373" y="499">resource found, not liked</text>
  <line class="call" id="svg_51" x1="1136" x2="1610" y1="545" y2="545"/>
  <text class="text" id="svg_52" text-anchor="middle" x="1373" y="539">save like + log activity</text>
  <line class="ret" id="svg_53" x1="1610" x2="1136" y1="580" y2="580"/>
  <text class="text" id="svg_54" text-anchor="middle" x="1373" y="574">persisted</text>
  <line class="call" id="svg_55" x1="1136" x2="1373" y1="625" y2="625"/>
  <text class="text" id="svg_56" text-anchor="middle" x="1254.5" y="619">notifyLike(resourceId, actorId)</text>
  <line class="call" id="svg_57" x1="1373" x2="1610" y1="680" y2="680"/>
  <text class="text" font-size="13" id="svg_58" text-anchor="middle" transform="matrix(1 0 0 1 0 0)" x="1455.5" y="673">load resource/owner; skip self-like; save notification</text>
  <line class="ret" id="svg_59" x1="1610" x2="1373" y1="715" y2="715"/>
  <text class="text" id="svg_60" text-anchor="middle" x="1491.5" y="709">notification saved or skipped</text>
  <line class="ret" id="svg_61" x1="1373" x2="1136" y1="760" y2="760"/>
  <text class="text" id="svg_62" text-anchor="middle" x="1254.5" y="754">done</text>
  <line class="ret" id="svg_63" x1="1136" x2="899" y1="815" y2="815"/>
  <text class="text" id="svg_64" text-anchor="middle" x="1017.5" y="809">success</text>
  <line class="ret" id="svg_65" x1="899" x2="425" y1="870" y2="870"/>
  <text class="text" id="svg_66" text-anchor="middle" x="662" y="864">200 OK</text>
  <line class="ret" id="svg_67" x1="425" x2="188" y1="925" y2="925"/>
  <text class="text" id="svg_68" text-anchor="middle" x="306.5" y="919">update like state / count</text>
  <rect class="note" height="100" id="svg_69" width="400" x="1320" y="830"/>
  <text class="head" id="svg_70" x="1336" y="854">Notes</text>
  <text class="small" id="svg_71" x="1336" y="876">JWT filter authenticates request before controller logic.</text>
  <text class="small" id="svg_72" x="1336" y="894">Notification is skipped for self-like in service logic.</text>
  <text class="small" id="svg_73" x="1336" y="912">Repository lifeline groups multiple repository calls for clarity.</text>
